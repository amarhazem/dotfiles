[".oh-my-zsh/custom/plugins/you-should-use"]
refreshPeriod = "168h"
type = "git-repo"
url = "https://github.com/MichaelAquilina/zsh-you-should-use.git"

[".oh-my-zsh/custom/plugins/you-should-use".clone]
args = ["--depth", "1"]

[".oh-my-zsh/custom/plugins/you-should-use".pull]
args = ["--ff-only"]

